name: Deploy Documentation

on:
  push:
    branches: ["master"]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: "pages"
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo registry and build artifacts
        uses: Swatinem/rust-cache@v2

      - name: Restore Leo CLI build cache
        id: leo_build_cache
        uses: actions/cache/restore@v4
        with:
          path: ~/.cargo-install-target
          key: leo-install-target-${{ runner.os }}-${{ github.run_id }}
          restore-keys: |
            leo-install-target-${{ runner.os }}-

      - name: Install Leo CLI
        run: |
          cargo install leo-lang --git https://github.com/ProvableHQ/leo --branch master --target-dir ~/.cargo-install-target
          leo --version

      - name: Save Leo CLI build cache
        if: always()
        uses: actions/cache/save@v4
        with:
          path: ~/.cargo-install-target
          key: ${{ steps.leo_build_cache.outputs.cache-primary-key }}

      - name: Setup Pages
        uses: actions/configure-pages@v4

      - name: Build Documentation
        run: |
          cargo doc --workspace --no-deps
          echo '<meta http-equiv="refresh" content="0; url=leo_bindings/index.html">' > target/doc/index.html

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: ./target/doc

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
